spring.application.name=boleiroOn
server.port=${SERVER_PORT}
app.front.url=${FRONTEND_URL}

spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

security.token.secret.user=${SECURITY_TOKEN_SECRET}
security.token.expiration-hours=${TOKEN_EXPIRATION_HOURS}

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

app.admin.default-email=${ADMIN_EMAIL}
app.admin.default-login=${ADMIN_LOGIN}
app.admin.default-password=${ADMIN_PASSWORD}

aws.accessKeyId=${AWS_ACCESS_KEY}
aws.secretKey=${AWS_SECRET_KEY}
aws.region=${AWS_REGION}
aws.s3.bucketName=${AWS_BUCKET_NAME}

resend.api.key=${RESEND_API_KEY}

app.email.verification=${EMAIL_VERIFICATION}
app.email.boleto=${EMAIL_BOLETO_ONLINE}
app.email.intern=${EMAIL_SYSTEM}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB